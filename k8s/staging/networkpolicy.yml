apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-backend-only
  namespace: taskflow-staging
spec:
  podSelector:
    matchLabels:
      app: taskflow
      tier: cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: taskflow
              tier: backend
      ports:
        - protocol: TCP
          port: 6379
